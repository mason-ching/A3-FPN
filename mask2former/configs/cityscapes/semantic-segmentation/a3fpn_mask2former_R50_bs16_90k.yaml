_BASE_: Base-Cityscapes-SemanticSegmentation.yaml
MODEL:
  WEIGHTS: "R-50.pkl"
  META_ARCHITECTURE: "MaskFormer"
  A3FPN:
    OUT_CHANNELS: 256
    SQUEEZE: [1, 1, 1, 1]
    USING_RESAMPLING: [True, True, True]
    NORM: "SyncBN"
    COMPRESS_CHANNELS: [16, 16, 16, 16]
    GROUP_NUMS: [16, 16, 16, 16]
    NUM_REPBLOCKS: 1
    EXPANSION: 4.0
    DCN_GROUPS: [16, 16, 16, 16]
    DCN_CONFIG:
      dcn_norm: 'LN'
      offset_scale: 2.0
      dw_kernel_size: 3
      dcn_output_bias: True
      center_feature_scale: False
      remove_center: False
      without_pointwise: False
  SEM_SEG_HEAD:
    NAME: "MaskFormerHead"
    IGNORE_VALUE: 255
    NUM_CLASSES: 19
    LOSS_WEIGHT: 1.0
    CONVS_DIM: 256
    MASK_DIM: 256
    NORM: "GN"
    # pixel decoder
    PIXEL_DECODER_NAME: "A3FPNMSDeformAttnPixelDecoder"
    IN_FEATURES: ["res2", "res3", "res4", "res5"]
    DEFORMABLE_TRANSFORMER_ENCODER_IN_FEATURES: ["res3", "res4", "res5"]
    COMMON_STRIDE: 4
    TRANSFORMER_ENC_LAYERS: 6
  MASK_FORMER:
    TRANSFORMER_DECODER_NAME: "MultiScaleMaskedTransformerDecoder"
    TRANSFORMER_IN_FEATURE: "multi_scale_pixel_decoder"
    DEEP_SUPERVISION: True
    NO_OBJECT_WEIGHT: 0.1
    CLASS_WEIGHT: 2.0
    MASK_WEIGHT: 5.0
    DICE_WEIGHT: 5.0
    HIDDEN_DIM: 256
    NUM_OBJECT_QUERIES: 100
    NHEADS: 8
    DROPOUT: 0.0
    DIM_FEEDFORWARD: 2048
    ENC_LAYERS: 0
    PRE_NORM: False
    ENFORCE_INPUT_PROJ: False
    SIZE_DIVISIBILITY: 32
    DEC_LAYERS: 10  # 9 decoder layers, add one for the loss on learnable query
    TRAIN_NUM_POINTS: 12544
    OVERSAMPLE_RATIO: 3.0
    IMPORTANCE_SAMPLE_RATIO: 0.75
    TEST:
      SEMANTIC_ON: True
      INSTANCE_ON: False
      PANOPTIC_ON: False
      OVERLAP_THRESHOLD: 0.8
      OBJECT_MASK_THRESHOLD: 0.8
DATALOADER:
  NUM_WORKERS: 5
SOLVER:
  MAX_ITER: 90000
  IMS_PER_BATCH: 16
  CHECKPOINT_PERIOD: 40
  WARMUP_ITERS: 500
  POLY_LR_POWER: 0.9  #  1.0
  POLY_LR_CONSTANT_ENDING: 0.0
  MAX_TO_KEEP: 3
  AMP:
    ENABLED: False
OUTPUT_DIR: "./weight/a3fpn_mask2former_cityscapes_R50_bs16_8gpus"
TEST:
  EVAL_PERIOD: 200
  VAL_METRIC: "sem_seg/IoU"
VIS_PERIOD: 200
WRITER_PERIOD: 20