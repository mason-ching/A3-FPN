_BASE_: "../Base-RCNN-A3FPN.yaml"
MODEL:
  BACKBONE:
    NAME: "build_resnet_a3fpn_backbone"
  WEIGHTS: "detectron2://ImageNetPretrained/MSRA/R-50.pkl"
  MASK_ON: False
  RESNETS:
    DEPTH: 50
  A3FPN:
    SQUEEZE: [1, 2, 4, 4]
    USING_RESAMPLING: [True, True, True]
    NORM: "SyncBN"
    COMPRESS_CHANNELS: [16, 16, 16, 32]
    GROUP_NUMS: [16, 16, 16, 32]
    NUM_REPBLOCKS: 1
    EXPANSION: 4.0
    DCN_GROUPS: [16, 16, 16, 32]
    DCN_CONFIG:
      dcn_norm: 'LN'
      offset_scale: 2.0
      dw_kernel_size: 3
      dcn_output_bias: True
      center_feature_scale: False
      remove_center: False
      without_pointwise: False
  ROI_HEADS:
    NUM_CLASSES: 20
INPUT:
  MIN_SIZE_TRAIN: (480, 512, 544, 576, 608, 640, 672, 704, 736, 768, 800)
  MIN_SIZE_TEST: 800
DATASETS:
  TRAIN: ('voc_2007_trainval', 'voc_2012_trainval')
  TEST: ('voc_2007_test',)
SOLVER:
  IMS_PER_BATCH: 8
  STEPS: (11000, 16000)
  MAX_ITER: 18000
  WARMUP_ITERS: 100
  CHECKPOINT_PERIOD: 100
  MAX_TO_KEEP: 3
OUTPUT_DIR: "detectron2_weight/faster-rcnn-a3fpn-voc"
TEST:
  EVAL_PERIOD: 1000
  VAL_METRIC: "bbox/AP50"
VIS_PERIOD: 1000
WRITER_PERIOD: 20
